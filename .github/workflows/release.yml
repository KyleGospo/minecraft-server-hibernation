name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.5.0)'
        required: true
        default: 'v2.5.0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
            suffix: .osx
          - os: darwin
            arch: arm64
            suffix: .osx
          - os: linux
            arch: amd64
            suffix: .bin
          - os: linux
            arch: arm
            suffix: .bin
          - os: linux
            arch: arm64
            suffix: .bin
          - os: windows
            arch: amd64
            suffix: .exe
          - os: windows
            arch: arm64
            suffix: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          COMMIT="${{ steps.vars.outputs.sha_short }}"
          FILENAME="msh-${VERSION}-${COMMIT}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}"
          
          go build -v \
            -ldflags="-X 'msh/lib/progmgr.MshVersion=${VERSION}' -X 'msh/lib/progmgr.MshCommit=${COMMIT}'" \
            -o "dist/${FILENAME}" .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            dist/
            msh-config.json